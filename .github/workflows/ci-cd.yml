name: Greg's Calculator CI/CD

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    steps:
       
      - name: FTP Deploy
        uses: "appleboy/scp-action@v0.1.7"
        with: 
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 22
          source: "./*"
          target: 'public_html'
          strip_components: 1
          
